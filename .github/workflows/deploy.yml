name: Deploy Bounty Board

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD^ for diff-based Discord notify

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate markdown from JSON
        run: node scripts/gen-markdown.mjs

      - name: Stage deploy files
        run: |
          mkdir -p dist
          cp index.html bounties.json bounty-board.md favicon.gif favicon.ico dist/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy dist/ to /var/www/bb.kitsuneden.net
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/bb.kitsuneden.net/

      - name: Notify Discord of bounty changes
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/discord-notify.mjs
