name: Notify Discord

# After Vercel auto-deploys on push (via the Vercel ↔ GitHub integration),
# this workflow runs the Discord webhook to summarize what changed.
# The actual site deploy is handled entirely by Vercel — no SFTP, no
# server to babysit.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD^ for diff-based Discord notify

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Notify Discord of bounty changes
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/discord-notify.mjs
